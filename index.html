<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Relatórios Gerenciais · FIIs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* Seus estilos originais mantidos */
:root { --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333; --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13); --gold: #f5c842; --gold2: #e0a800; --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72; --green: #2ecc71; --red: #e74c3c; --amber: #f39c12; }
body.light { --bg: #f5f7fa; --bg2: #ffffff; --text: #1a1a2e; --text2: #4a5568; }
/* ... (mantive todos os seus estilos, só adicionei alguns novos) */
.filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
.filter-row select, .filter-row button { padding: 8px 12px; border-radius: 8px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); }
.gerencial { background: rgba(245,200,66,0.18) !important; border-left: 4px solid var(--gold) !important; }
</style>
</head>
<body>

<!-- ... (header e cards de API mantidos iguais) ... -->

<div class="card">
  <div class="card-title">📄 Buscar Documentos no Fundos.NET</div>
  
  <div class="api-row">
    <input type="text" id="tickerBusca" class="api-input" placeholder="Ticker (ex: HGLG11)" style="flex:2">
    <button id="btnBuscarRelatorios" class="btn btn-gold">🔍 Buscar</button>
    <button id="btnLimparBusca" class="btn btn-ghost">Limpar</button>
  </div>

  <!-- Novos Filtros -->
  <div class="filter-row">
    <select id="filtroAno">
      <option value="">Todos os anos</option>
      <option value="2026" selected>2026</option>
      <option value="2025">2025</option>
      <option value="2024">2024</option>
    </select>

    <select id="filtroTipo">
      <option value="">Todos os tipos</option>
      <option value="gerencial">Relatório Gerencial</option>
      <option value="rendimentos">Rendimentos e Amortizações</option>
      <option value="relatorio">Relatórios em Geral</option>
    </select>
  </div>

  <div id="listaRelatorios" style="margin-top:1rem; max-height:550px; overflow-y:auto;"></div>
</div>

<!-- resto do seu HTML (upload, resultado, etc.) -->

<script>
// ... (seu código de API Key, Gemini, etc. mantido)

// ==================== BUSCA COM FILTROS ====================
async function buscarRelatorios(ticker) {
  const listaDiv = document.getElementById('listaRelatorios');
  listaDiv.innerHTML = '<div style="padding:2rem; text-align:center;">⏳ Buscando...</div>';

  const anoSelecionado = document.getElementById('filtroAno').value;
  const tipoSelecionado = document.getElementById('filtroTipo').value;

  try {
    const resp = await fetch(`${WORKER_BASE}/buscar?ticker=${encodeURIComponent(ticker)}`);
    const data = await resp.json();

    let docs = data.documentos || [];

    // Aplicar filtros no frontend
    if (anoSelecionado) {
      docs = docs.filter(d => {
        const dataStr = (d.dataEntrega || d.dataReferencia || '');
        return dataStr.includes(anoSelecionado);
      });
    }

    if (tipoSelecionado) {
      docs = docs.filter(d => {
        const tipo = String(d.tipo || d.tipoDocumento || '').toLowerCase();
        if (tipoSelecionado === 'gerencial') return tipo.includes('gerencial');
        if (tipoSelecionado === 'rendimentos') return tipo.includes('rendimentos') || tipo.includes('amortiza');
        if (tipoSelecionado === 'relatorio') return tipo.includes('relatorio') || tipo.includes('relatório');
        return true;
      });
    }

    if (docs.length === 0) {
      listaDiv.innerHTML = `<div style="padding:1.5rem; color:var(--amber);">Nenhum documento encontrado com os filtros selecionados.</div>`;
      return;
    }

    let html = `<div class="result-label">📄 ${docs.length} documento(s) encontrado(s)</div>`;

    for (const doc of docs) {
      const tipo = String(doc.tipo || doc.tipoDocumento || 'Documento');
      const isGerencial = tipo.toLowerCase().includes('gerencial');
      
      html += `
        <div style="padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; ${isGerencial ? 'class="gerencial"' : ''}">
          <div>
            <strong>${escapeHtml(tipo)}</strong><br>
            <small>Entrega: ${doc.dataEntrega || '-'} | Ref: ${doc.dataReferencia || '-'}</small>
          </div>
          <button class="btn-baixar btn btn-ghost" data-id="${doc.id}" data-nome="${escapeHtml(tipo)}">
            📥 Baixar e Analisar
          </button>
        </div>`;
    }

    listaDiv.innerHTML = html;

    document.querySelectorAll('.btn-baixar').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        const nome = btn.getAttribute('data-nome');
        baixarEAnalisar(id, nome);
      });
    });

  } catch (err) {
    listaDiv.innerHTML = `<div style="padding:1rem; color:var(--red);">❌ Erro: ${err.message}</div>`;
  }
}

// Evento do botão Buscar
document.getElementById('btnBuscarRelatorios').addEventListener('click', () => {
  const ticker = document.getElementById('tickerBusca').value.trim().toUpperCase();
  if (!ticker) return setStatus('Digite um ticker', 'err');
  buscarRelatorios(ticker);
});

document.getElementById('btnLimparBusca').addEventListener('click', () => {
  document.getElementById('tickerBusca').value = '';
  document.getElementById('listaRelatorios').innerHTML = '';
});
</script>
</body>
</html>
