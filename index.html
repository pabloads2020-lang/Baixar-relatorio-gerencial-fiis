<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Gerencial FII - Fundos.Net</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        input { width: 200px; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #resultado { margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .loading { color: #007bff; }
        .erro { color: red; }
        iframe { width: 100%; height: 400px; border: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🔍 Relatório Gerencial Mais Recente do FII</h1>
    <p>Digite o ticker (ex: KNRI11) e clique em Buscar. Pega o mais recente de 2026 no Fundos.Net.</p>
    
    <input type="text" id="ticker" placeholder="KNRI11" maxlength="10">
    <button onclick="buscarRelatorio()">Buscar</button>
    
    <div id="resultado"></div>
    <iframe id="frame" style="display: none;"></iframe>

    <script>
        async function buscarRelatorio() {
            const tickerInput = document.getElementById('ticker');
            const ticker = tickerInput.value.toUpperCase().trim();
            const resultado = document.getElementById('resultado');
            const frame = document.getElementById('frame');
            
            if (!ticker) {
                resultado.innerHTML = '<p class="erro">Digite o ticker!</p>';
                return;
            }
            
            resultado.innerHTML = '<p class="loading">Buscando no Fundos.Net... Aguarde.</p>';
            frame.style.display = 'none';
            
            try {
                // Substitua pela URL do seu Cloudflare Worker
                const workerUrl = `https://seu-worker.seudominio.workers.dev/?ticker=${ticker}`;
                // Ou use GitHub Pages com proxy se não tiver Worker ainda
                
                const response = await fetch(workerUrl);
                const html = await response.text();
                
                if (response.ok) {
                    frame.src = workerUrl;
                    frame.style.display = 'block';
                    resultado.innerHTML = `<p>✅ Encontrado! Veja abaixo ou <a href="${workerUrl}" target="_blank">abra link direto</a>.</p>`;
                } else {
                    resultado.innerHTML = `<p class="erro">${html}</p>`;
                }
            } catch (error) {
                resultado.innerHTML = `<p class="erro">Erro: ${error.message}. Verifique o Worker.</p>`;
            }
        }
        
        // Busca ao Enter
        document.getElementById('ticker').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarRelatorio();
        });
    </script>
</body>
</html>
