<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Relatórios Gerenciais · FIIs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ===== ESTILOS ===== */
:root { --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333; --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13); --gold: #f5c842; --gold2: #e0a800; --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72; --green: #2ecc71; --green-bg: rgba(46,204,113,0.12); --red: #e74c3c; --red-bg: rgba(231,76,60,0.12); --amber: #f39c12; --amber-bg: rgba(243,156,18,0.12); --blue: #3498db; --blue-bg: rgba(52,152,219,0.12); --header-bg: #161b25; --header-border: rgba(255,255,255,0.07); --card-bg: #161b25; --card-border: rgba(255,255,255,0.07); --input-bg: #1c2333; --input-border: rgba(255,255,255,0.13); --debug-bg: #1c2333; --overlay-bg: rgba(14,17,23,.92); --footer-border: rgba(255,255,255,0.07); --result-item-bg: #1c2333; }
body.light { --bg: #f5f7fa; --bg2: #ffffff; --bg3: #f0f2f5; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12); --gold: #d4a017; --gold2: #b8860b; --text: #1a1a2e; --text2: #4a5568; --text3: #718096; --green: #27ae60; --green-bg: rgba(39,174,96,0.1); --red: #e74c3c; --red-bg: rgba(231,76,60,0.1); --amber: #e67e22; --amber-bg: rgba(230,126,34,0.1); --header-bg: #ffffff; --header-border: rgba(0,0,0,0.08); --card-bg: #ffffff; --card-border: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #e2e8f0; --debug-bg: #f7fafc; --overlay-bg: rgba(255,255,255,.95); --footer-border: rgba(0,0,0,0.08); --result-item-bg: #f7fafc; }
* { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, color 0.2s; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #000; }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
.main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; transition: transform 0.2s; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.api-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.api-input { flex: 1; background: var(--input-bg); border: 1.5px solid var(--input-border); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text); outline: none; }
.api-input:focus { border-color: var(--gold); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover:not(:disabled) { background: var(--gold2); opacity: 0.9; }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--gold); }
.status { display: none; padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 1rem; border: 1px solid transparent; }
.status.show { display: block; }
.status-ok { background: var(--green-bg); color: var(--green); border-color: rgba(46,204,113,0.2); }
.status-err { background: var(--red-bg); color: var(--red); border-color: rgba(231,76,60,0.2); }
.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; backdrop-filter: blur(4px); }
.overlay.show { display: flex; }
.spin { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: rot 0.8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.resultados-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-top: 1rem; }
.result-card { background: var(--bg3); border-radius: 10px; padding: 1rem; border: 1px solid var(--border); }
.result-label { font-size: 11px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
.result-value { font-size: 16px; font-weight: 700; color: var(--text); }
.resumo-box { grid-column: 1 / -1; background: var(--bg3); border-radius: 10px; padding: 1.25rem; border-left: 4px solid var(--blue); }
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spin"></div><div id="overlayText">Aguarde...</div></div>

<header class="header">
  <div class="header-logo"><div class="dot">FII</div>Leitor de Relatórios Gerenciais</div>
  <div class="header-right"><div id="hDate" style="font-size: 12px; color: var(--text3); margin-right: 15px;"></div><button class="theme-toggle" id="themeToggle">🌙</button></div>
</header>

<main class="main">
  <!-- API Key -->
  <div class="card">
    <div class="card-title">🔑 API Gemini</div>
    <div class="api-row">
      <input type="password" id="apiKeyInput" class="api-input" placeholder="Cole sua chave Gemini aqui...">
      <button class="btn btn-gold" id="btnSalvarKey">💾 Salvar</button>
    </div>
  </div>

  <!-- Busca Corrigida -->
  <div class="card">
    <div class="card-title">🔍 Buscar da B3 (Fundos.NET)</div>
    <div class="api-row">
      <input type="text" id="tickerBusca" class="api-input" placeholder="Ex: HGLG11">
      <button id="btnBuscarRelatorios" class="btn btn-gold">🔍 Pesquisar</button>
    </div>
    <div id="listaRelatorios" style="margin-top:1rem;"></div>
  </div>

  <!-- Resultado -->
  <div id="resultArea" class="card" style="display:none">
    <div class="card-title">📊 Resultado da Análise <button class="btn-ghost" onclick="window.print()" style="padding:4px 8px; font-size:11px;">🖨️ Imprimir</button></div>
    <div id="resultadosConteudo" class="resultados-grid"></div>
  </div>
  
  <div id="status" class="status"></div>
</main>

<script>
// ========== CONFIGURAÇÃO E CORREÇÃO DE DATA ==========
const WORKER_BASE = "https://ancient-moon-3aa3.pabloads2020.workers.dev";
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Função vital: Transforma "DD/MM/YYYY" ou "YYYY-MM-DD" em objeto Date real
function parseDataBR(str) {
    if (!str) return null;
    const partes = str.match(/(\d{2})[\/\-](\d{2})[\/\-](\d{4})/);
    if (partes) return new Date(partes[3], partes[2] - 1, partes[1]); // Ano, Mes(0-11), Dia
    const iso = new Date(str);
    return isNaN(iso) ? null : iso;
}

function setStatus(msg, tipo) { 
    const el = document.getElementById('status'); 
    el.innerHTML = msg; 
    el.className = `status show status-${tipo}`; 
    setTimeout(() => el.classList.remove('show'), 8000); 
}

function setOverlay(show, txt) { 
    document.getElementById('overlay').classList.toggle('show', show); 
    if(txt) document.getElementById('overlayText').textContent = txt; 
}

// ========== BUSCA DE RELATÓRIOS (CORRIGIDA) ==========
async function buscarRelatorios(ticker) {
    const agora = new Date();
    const resp = await fetch(`${WORKER_BASE}/buscar?ticker=${encodeURIComponent(ticker)}`);
    const data = await resp.json();
    
    if (data.erro || !data.documentos) throw new Error(data.erro || "Falha na busca");

    // Filtra e converte datas corretamente
    const rgs = data.documentos
        .filter(d => d.tipo === "Relatório Gerencial")
        .map(d => ({ ...d, dataObj: parseDataBR(d.dataEntrega) }))
        .filter(d => d.dataObj && d.dataObj <= agora); // Somente entregues até agora

    // Ordena do mais novo para o mais velho
    rgs.sort((a,b) => b.dataObj - a.dataObj);

    return rgs.slice(0, 3);
}

document.getElementById('btnBuscarRelatorios').addEventListener('click', async () => {
    const ticker = document.getElementById('tickerBusca').value.trim().toUpperCase();
    if (!ticker) return;
    
    const lista = document.getElementById('listaRelatorios');
    lista.innerHTML = "⏳ Buscando...";
    
    try {
        const docs = await buscarRelatorios(ticker);
        if (docs.length === 0) { lista.innerHTML = "Nenhum relatório encontrado."; return; }
        
        lista.innerHTML = docs.map(d => `
            <div style="padding:12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <strong>Gerencial - ${d.dataReferencia || ''}</strong><br>
                    <small style="color:var(--text3)">Entregue em: ${d.dataEntrega}</small>
                </div>
                <button class="btn btn-ghost" onclick="baixarEAnalisar('${d.id}', '${d.dataEntrega}')">📥 Analisar</button>
            </div>
        `).join('');
    } catch(e) { lista.innerHTML = "Erro: " + e.message; }
});

// ========== ANÁLISE DE IA (OTIMIZADA PARA VELOCIDADE) ==========
async function baixarEAnalisar(id, dataE) {
    const apiKey = localStorage.getItem('gemini_api_key');
    if (!apiKey) { alert("Configure a chave API primeiro!"); return; }

    setOverlay(true, "Baixando PDF da B3...");
    try {
        const resp = await fetch(`${WORKER_BASE}/baixar?id=${id}`);
        const blob = await resp.blob();
        
        setOverlay(true, "Lendo PDF...");
        const arrayBuffer = await blob.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        
        let fullText = "";
        // Otimização: Lê apenas as primeiras 20 páginas (suficiente para FIIs)
        const maxPages = Math.min(pdf.numPages, 20);
        for(let i=1; i<=maxPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            fullText += content.items.map(s => s.str).join(" ") + " ";
        }

        setOverlay(true, "IA Analisando (Gemini Flash)...");
        // Otimização: Reduzi o TEXTO_MAX para 150k caracteres para ser mais rápido
        const promptText = fullText.substring(0, 150000);
        
        const aiResp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Analise o relatório de FII e retorne JSON:\n{ "ticker": "","vacancia_fisica": "","distribuicao": "","resumo_analista": "" }\n\nTexto:\n${promptText}` }] }],
                generationConfig: { temperature: 0.1, maxOutputTokens: 1000 } // Otimização: resposta curta = mais rápida
            })
        });

        const aiData = await aiResp.json();
        const rawJson = aiData.candidates[0].content.parts[0].text.replace(/```json|```/g, "");
        const final = JSON.parse(rawJson);

        renderResultados(final, dataE);
        setStatus("Análise concluída!", "ok");
    } catch(e) {
        setStatus("Erro: " + e.message, "err");
    } finally {
        setOverlay(false);
    }
}

function renderResultados(d, dataE) {
    const area = document.getElementById('resultadosConteudo');
    area.innerHTML = `
        <div class="result-card"><div class="result-label">Ticker</div><div class="result-value">${d.ticker || '---'}</div></div>
        <div class="result-card"><div class="result-label">Data Entrega</div><div class="result-value">${dataE}</div></div>
        <div class="result-card"><div class="result-label">Vacância</div><div class="result-value">${d.vacancia_fisica || '---'}</div></div>
        <div class="result-card"><div class="result-label">Distribuição</div><div class="result-value">${d.distribuicao || '---'}</div></div>
        <div class="resumo-box"><div class="result-label">🤖 Análise da IA</div><div>${d.resumo_analista || 'Sem resumo disponível.'}</div></div>
    `;
    document.getElementById('resultArea').style.display = 'block';
}

// Inicialização
document.getElementById('btnSalvarKey').addEventListener('click', () => {
    localStorage.setItem('gemini_api_key', document.getElementById('apiKeyInput').value.trim());
    setStatus("Chave salva com sucesso!", "ok");
});
document.getElementById('apiKeyInput').value = localStorage.getItem('gemini_api_key') || "";

const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('light');
    themeToggle.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
});

setInterval(() => { document.getElementById('hDate').textContent = new Date().toLocaleString('pt-BR'); }, 1000);
</script>

</body>
</html>
