<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Relatórios Gerenciais · FIIs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
/* ===== SEU CSS INTEIRO (SEM ALTERAÇÃO) ===== */
/* ... mantido igual ao seu código ... */
</style>
</head>

<body>

<!-- ===== SEU HTML INTEIRO (SEM ALTERAÇÃO) ===== -->

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const WORKER_BASE = "https://ancient-moon-3aa3.pabloads2020.workers.dev";

/* ===== UTIL ===== */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ═════════════════════════════════════════════════════
   🔥 FIX PRINCIPAL (AQUI ESTAVA O ERRO)
   ═════════════════════════════════════════════════════ */

document.getElementById('btnBuscarRelatorios').addEventListener('click', async () => {
  const ticker = document.getElementById('tickerBusca').value.trim().toUpperCase();
  if (!ticker) {
    setStatusBusca('Digite um ticker (ex: HGBS11)', 'err');
    return;
  }

  const btn = document.getElementById('btnBuscarRelatorios');
  btn.disabled = true;
  btn.textContent = '⏳ Buscando...';

  const listaDiv = document.getElementById('listaRelatorios');
  listaDiv.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--text3);">🔍 Consultando...</div>';

  try {
    const resp = await fetch(`${WORKER_BASE}?ticker=${encodeURIComponent(ticker)}`);

    /* ✅ FIX 1: valida primeiro status */
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}`);
    }

    /* ✅ FIX 2: parse seguro */
    let data;
    const text = await resp.text();

    try {
      data = JSON.parse(text);
    } catch (e) {
      console.error("Resposta inválida do Worker:", text);
      throw new Error("Worker retornou resposta inválida (não JSON)");
    }

    /* fallback de erro vindo do backend */
    if (data?.erro || data?.error) {
      throw new Error(data.erro || data.error);
    }

    const docs = data.documentos || data.relatorios || [];

    if (!docs.length) {
      listaDiv.innerHTML = '<div style="padding:1rem;color:var(--text3);">Nenhum relatório encontrado.</div>';
      return;
    }

    let html = `<div style="margin-bottom:.75rem;">📄 ${docs.length} relatório(s):</div>`;

    docs.forEach(doc => {
      html += `
        <div class="relatorio-item">
          <div>
            <strong>${escapeHtml(doc.dataReferencia || '—')}</strong><br>
            <small>ID: ${escapeHtml(String(doc.id))}</small>
          </div>
          <button class="btn btn-gold btn-baixar" data-id="${escapeHtml(String(doc.id))}">
            📥 Baixar
          </button>
        </div>`;
    });

    listaDiv.innerHTML = html;

    document.querySelectorAll('.btn-baixar').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        await baixarEAnalisar(id, ticker);
      });
    });

  } catch (err) {
    listaDiv.innerHTML = `<div style="padding:1rem;color:var(--red);">❌ ${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 Buscar';
  }
});

/* ===== RESTANTE DO SEU SCRIPT CONTINUA IGUAL ===== */

</script>
</body>
</html>
