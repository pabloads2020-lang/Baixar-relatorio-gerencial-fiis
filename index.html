<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FII Relatórios 2026</title>
    <style>
        body { margin: 0; font-family: Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 600px; text-align: center; }
        input { width: 250px; padding: 15px; font-size: 18px; border: 3px solid #e1e5e9; border-radius: 12px; margin: 10px; }
        button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 12px; cursor: pointer; margin: 10px; }
        button:hover { background: #218838; }
        iframe { width: 100%; height: 600px; border: none; border-radius: 12px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #333; margin-bottom: 10px; }
        .exemplos { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📈 Relatório Gerencial FII 2026</h1>
        <p>Seu Worker: ancient-moon-3aa3.pabloads2020.workers.dev</p>
        
        <input type="text" id="ticker" placeholder="KNRI11" value="KNRI11">
        <button onclick="carregarWorker()">🔍 Buscar</button>
        
        <div class="exemplos">
            Funciona: KNRI11 • HGLG11 • XPML11 • BCFF11
        </div>
        
        <iframe id="workerFrame" src=""></iframe>
    </div>

    <script>
        function carregarWorker() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            document.getElementById('workerFrame').src = `https://ancient-moon-3aa3.pabloads2020.workers.dev/?ticker=${ticker}`;
        }
        
        // Auto-load exemplo
        carregarWorker();
        document.getElementById('ticker').addEventListener('keypress', e => e.key === 'Enter' && carregarWorker());
    </script>
</body>
</html>
