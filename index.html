/* ═══ WORKER URL ══════════════════════════════════════════════════════════ */
// Certifique-se de que esta URL está correta e sem barra no final
const WORKER_BASE = "https://ancient-moon-3aa3.pabloads2020.workers.dev";

/* ═══ BUSCA POR TICKER (INTEGRADO COM WORKER) ════════════════════════════ */
document.getElementById('btnBuscarRelatorios').addEventListener('click', async () => {
  const ticker = document.getElementById('tickerBusca').value.trim().toUpperCase();
  if (!ticker) { setStatusBusca('Digite um ticker (ex: HGBS11)', 'err'); return; }

  const btn = document.getElementById('btnBuscarRelatorios');
  btn.disabled = true; btn.textContent = '⏳ Buscando...';
  const listaDiv = document.getElementById('listaRelatorios');
  listaDiv.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--text3);">🔍 Consultando Fundos.NET...</div>';

  try {
    // Chamada ao seu Worker: ?ticker=XXXX
    const resp = await fetch(`${WORKER_BASE}?ticker=${ticker}`);
    const data = await resp.json();

    if (data.erro) throw new Error(data.erro);

    const docs = data.documentos || [];
    if (docs.length === 0) {
      listaDiv.innerHTML = '<div style="padding:1rem;color:var(--text3);">Nenhum relatório encontrado.</div>';
      return;
    }

    let html = `<div class="result-label">📄 Relatórios de ${ticker}:</div>`;
    docs.forEach((doc, idx) => {
      html += `
        <div class="relatorio-item ${idx === 0 ? 'relatorio-destaque' : ''}">
          <div class="relatorio-info">
            <strong>Ref: ${doc.dataReferencia}</strong>
            <small>Entrega: ${doc.dataEntrega} | ID: ${doc.id}</small>
          </div>
          <button class="btn btn-gold btn-baixar" data-id="${doc.id}" data-ticker="${ticker}">
            📥 Analisar
          </button>
        </div>`;
    });
    listaDiv.innerHTML = html;

    // Evento de clique para baixar
    document.querySelectorAll('.btn-baixar').forEach(b => {
      b.addEventListener('click', () => baixarEAnalisar(b.dataset.id, b.dataset.ticker));
    });

  } catch (err) {
    listaDiv.innerHTML = `<div style="padding:1rem;color:var(--red);">❌ ${err.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '🔍 Buscar';
  }
});

/* ═══ BAIXAR E ANALISAR (INTEGRADO COM WORKER) ══════════════════════════ */
async function baixarEAnalisar(docId, ticker) {
  const apiKey = getApiKey();
  if (!validarApiKey(apiKey)) {
    setStatus('🔑 Configure sua chave API primeiro.', 'err');
    return;
  }

  setOverlay(true, `📥 Baixando PDF do FNET (ID: ${docId})...`);
  
  try {
    // Chamada ao seu Worker para o PDF: ?id=XXX&acao=pdf
    const urlPdf = `${WORKER_BASE}?id=${docId}&acao=pdf`;
    const resp = await fetch(urlPdf);
    
    if (!resp.ok) throw new Error("Erro ao baixar PDF do Worker.");

    const blob = await resp.blob();
    const file = new File([blob], `${ticker}_relatorio.pdf`, { type: 'application/pdf' });

    // Coloca o arquivo no input hidden para o fluxo da IA ler
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('filePdf').files = dt.files;
    document.getElementById('fileName').textContent = file.name;

    setOverlay(false);
    // Dispara o clique no botão de análise que já existe no seu código
    document.getElementById('btnImportar').click();

  } catch (err) {
    setOverlay(false);
    setStatus(`❌ Erro: ${err.message}`, 'err');
  }
}
